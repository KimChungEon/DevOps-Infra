apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-config
  namespace: db-cluster
data:
  mongod.conf: |
    storage:
      dbPath: /data/db
    net:
      port: 27017
      bindIp: 0.0.0.0
    replication:
      replSetName: rs0
    systemLog:
      destination: file
      path: /var/log/mongodb/mongod.log
      logAppend: true
